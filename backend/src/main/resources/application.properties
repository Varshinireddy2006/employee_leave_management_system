# ==============================
# Server Configuration
# ==============================
server.port=${PORT:8080}
spring.application.name=elms-backend

# ==============================
# Database Configuration
# Auto-switches between MySQL (production) and H2 (local dev)
# Set MYSQL_URL env variable in Railway/Render to activate MySQL
# ==============================
spring.datasource.url=${MYSQL_URL:jdbc:h2:mem:elms_db}
spring.datasource.username=${MYSQL_USER:sa}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=${MYSQL_DRIVER:org.h2.Driver}

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# H2 Console (disabled in production, safe to keep)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# Auto-detect dialect (no need to hardcode)
spring.jpa.properties.hibernate.dialect=

# ==============================
# JWT Configuration
# ==============================
jwt.secret=${JWT_SECRET:elms-secret-key-for-jwt-token-generation-2024}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ==============================
# CORS Configuration
# Set CORS_ALLOWED_ORIGINS in Railway to your Vercel URL
# ==============================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ==============================
# File Upload
# ==============================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ==============================
# Logging (reduced for production)
# ==============================
logging.level.com.elms=${LOG_LEVEL:INFO}
logging.level.org.springframework.security=WARN
